font_family       JetBrainsMono Nerd Font Mono Propo monospace
font_size         12.5

disable_lingatures  yes
enable_audio_bell   no

shell zsh
shell_integration disabled

cursor_shape      beam

url_style         curly

remember_window_size no
#initial_window_width 640
#initial_window_height  400
intial_window_height 23c
initial_window_width 78c
window_padding_width 30
cursor_blink_interval 0

background_opacity  0.80
scrollbar_handle_opacity  0
scrollbar_track_opacity   0
scrollbar_track_hover_opacity   0
confirm_os_window_close   0

# --Performance
sync_to_monitor   no

# --Perf
repaint_delay     8
input_delay       3

cursor_trail      3


# BEGIN_KITTY_THEME
# Matugen
include current-theme.conf
# END_KITTY_THEME
